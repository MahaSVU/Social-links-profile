<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Links Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background-color: #282727;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      width: 100%;
      max-width: 320px;
    }

    .container img {
      width: 90px;
      border-radius: 50%;
      margin-bottom: 20px;
    }

    h1 {
      color: white;
      font-size: 24px;
      margin-bottom: 10px;
    }

    .location {
      color: #C4F82A;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .bio {
      color: white;
      font-size: 14px;
      margin-bottom: 25px;
    }

    ul {
      list-style: none;
    }

    li {
      margin-bottom: 12px;
    }

    a {
      display: block;
      text-decoration: none;
      background-color: #5f5e5e;
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background-color: #C4F82A;
      color: black;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="./assets/images/avatar-jessica.jpeg" alt="avatar">

    <h1>Jessica Randall</h1>
    <p class="location">London, United Kingdom</p>
    <p class="bio">"Front-end developer and avid reader."</p>

    <ul>
      <li><a href="#">GitHub</a></li>
      <li><a href="#">Frontend Mentor</a></li>
      <li><a href="#">LinkedIn</a></li>
      <li><a href="#">Twitter</a></li>
      <li><a href="#">Instagram</a></li>
    </ul>
  </div>
</body>

</html>
